<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAR/STR Game 🎮</title>

<style>
body {
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(to right, #e1f5fe, #fce4ec);
  text-align: center;
  padding: 20px;
}

h1 {
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

.card {
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #2196f3;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #1976d2;
}

.scoreboard {
  font-size: 18px;
  margin-bottom: 10px;
}

.result {
  font-weight: bold;
  margin-top: 10px;
}
</style>

</head>
<body>

<h1>🚨 SAR/STR Game 🎮</h1>

<div class="scoreboard">
  ⭐ Score: <span id="score">0</span> |
  🎯 Level: <span id="level">1</span>
</div>

<div class="card">
  <h2 id="question">Loading...</h2>

  <button onclick="answer(true)">🚨 Suspicious</button>
  <button onclick="answer(false)">😊 Normal</button>

  <p id="result" class="result"></p>
</div>

<!-- Sounds -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c1e0d8d1b.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d4d6f7b6f.mp3"></audio>
<audio id="levelUpSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3f2c1c7c8f.mp3"></audio>

<script>
let score = 0;
let level = 1;
let currentQ = 0;

const questions = [
  { q: "Kid saves ₹50 every week", a: false },
  { q: "Someone deposits ₹999 again and again", a: true },
  { q: "Money comes from unknown person", a: true },
  { q: "You get pocket money from parents", a: false },
  { q: "Money goes in and out immediately", a: true },
  { q: "Regular salary deposit", a: false }
];

function playSound(id) {
  document.getElementById(id).currentTime = 0;
  document.getElementById(id).play();
}

function loadQuestion() {
  document.getElementById("question").innerText = questions[currentQ].q;
  document.getElementById("result").innerText = "";
}

function answer(userAns) {
  playSound("clickSound");

  let correct = questions[currentQ].a;

  if (userAns === correct) {
    score++;
    playSound("correctSound");
    document.getElementById("result").innerText = "🎉 Correct!";
  } else {
    playSound("wrongSound");
    document.getElementById("result").innerText = "❌ Wrong!";
  }

  currentQ++;

  // Level up every 3 questions
  if (currentQ % 3 === 0) {
    level++;
    playSound("levelUpSound");
  }

  if (currentQ >= questions.length) {
    endGame();
  } else {
    setTimeout(loadQuestion, 1000);
  }

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
}

function endGame() {
  document.querySelector(".card").innerHTML = `
    <h2>🏆 Game Over!</h2>
    <p>Your Score: ${score}</p>
    <button onclick="restart()">🔄 Restart</button>
  `;
}

function restart() {
  score = 0;
  level = 1;
  currentQ = 0;

  document.querySelector(".card").innerHTML = `
    <h2 id="question"></h2>
    <button onclick="answer(true)">🚨 Suspicious</button>
    <button onclick="answer(false)">😊 Normal</button>
    <p id="result" class="result"></p>
  `;

  updateUI();
  loadQuestion();
}

// Start game
loadQuestion();
</script>

</body>
</html>
